services:

  api:
    build: .
    container_name: api-node

    ports:
      - "3001:3000"

    env_file:
      - .env

    depends_on:
      - db

    networks:
      - app-network

  db:
    image: mysql:8

    container_name: mysql-db

    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: practica

    ports:
      - "3306:3306"

    volumes:
      - mysql-data:/var/lib/mysql

    networks:
      - app-network

networks:
  app-network:

volumes:
  mysql-data: